name: Test and Coverage

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: make get

      - name: Run tests with coverage
        run: make coverage

      - name: Update Coverage Badge in README
        run: |
          sudo apt-get update && sudo apt-get install -y lcov
          make update-readme-coverage

      - name: Run All Analysis (Standard + DCM)
        run: |
          cat analysis_options_gh.yaml >> analysis_options.yaml
          make analyze-all

      - name: Commit and Push changes
        if: github.event_name == 'push'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md lint_report.txt LINT_REPORT.md dcm_report.txt
          git commit -m "docs: update coverage and lint report [skip ci]" || echo "No changes to commit"
          git push
